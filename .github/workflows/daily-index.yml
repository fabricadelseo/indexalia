name: Envío diario a indexar

# Corre todos los días a las 08:00 UTC (≈ 10:00 hora peninsular española).
# Ajusta el cron si quieres otra hora.
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Enviar lote del día a Google (+ IndexNow)
        env:
          # Acceso a Google — usa el mismo token OAuth que generas en local.
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          # (alternativa) cuenta de servicio:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          # Cola compartida en Google Sheets (necesaria para el modo online):
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Refuerzo gratis Bing/Yandex (opcional):
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          DAILY_LIMIT: "3"
        run: python daily_batch.py
